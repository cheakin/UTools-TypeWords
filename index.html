<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type Words - 英语练习</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }
    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .loading {
      font-size: 18px;
      color: #666;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading">加载中...</div>
    <iframe id="app" src="http://localhost:5567"></iframe>
  </div>
  <script>
    // 监听 iframe 加载完成
    document.getElementById('app').onload = function() {
      document.querySelector('.loading').style.display = 'none';
    };

    // 监听 uTools 事件
    if (window.uTools) {
      window.uTools.onPluginEnter((info) => {
        console.log('插件被激活', info);
        // 可以根据 info 中的内容进行相应的处理
      });

      window.uTools.onPluginOut(() => {
        console.log('插件被退出');
        // 可以进行一些清理工作
      });
    }
  </script>
</body>
</html>
